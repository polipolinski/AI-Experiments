<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Примерка помады</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #0f0d0c; color: #f0ece6; display: flex; flex-direction: column; align-items: center; padding: 1rem; min-height: 100vh; }
  h1 { font-size: 22px; font-weight: 400; font-family: Georgia, serif; margin-bottom: 1rem; }
  h1 em { font-style: italic; color: #e8927a; }
  .video-wrap { position: relative; width: 100%; max-width: 520px; }
  video { width: 100%; display: block; transform: scaleX(-1); }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
  .status { font-size: 13px; color: #8a837a; margin: 8px 0; text-align: center; }
  .controls { width: 100%; max-width: 520px; background: #1a1714; border-radius: 12px; padding: 1rem; margin-top: 12px; }
  .ctrl-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #5c5650; margin-bottom: 10px; }
  .shades { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding-bottom: 20px; }
  .shade-btn { width: 42px; height: 42px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; position: relative; flex-shrink: 0; transition: transform .15s; }
  .shade-btn:hover { transform: scale(1.1); }
  .shade-btn.on { border-color: #fff; transform: scale(1.08); }
  .shade-btn span { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #5c5650; white-space: nowrap; }
  .divider { height: 1px; background: rgba(255,255,255,.08); margin: 12px 0; }
  .slider-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .slider-row label { font-size: 12px; color: #8a837a; min-width: 90px; }
  .slider-row input { flex: 1; accent-color: #c9705a; }
  .slider-row span { font-size: 12px; color: #8a837a; min-width: 34px; text-align: right; }
  .ct { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
  .ct-warm { background: rgba(220,150,60,.2); color: #d4924a; }
  .ct-cool { background: rgba(90,130,210,.2); color: #7ea4d8; }
  .ct-neutral { background: rgba(180,170,160,.15); color: #b0a89e; }
</style>
</head>
<body>
<h1>Примерка <em>помады</em></h1>
<div class="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>
<div class="status" id="status">Загрузка модели...</div>

<div class="controls">
  <div class="ctrl-label">Оттенок</div>
  <div class="shades" id="shades">
    <button class="shade-btn on" data-r="196" data-g="149" data-b="106" style="background:#C4956A"><span>нюд</span></button>
    <button class="shade-btn" data-r="224" data-g="100" data-b="140" style="background:#F48FB1"><span>розовый</span></button>
    <button class="shade-btn" data-r="192" data-g="57" data-b="43" style="background:#C0392B"><span>красный</span></button>
    <button class="shade-btn" data-r="142" data-g="58" data-b="89" style="background:#8E3A59"><span>ягодный</span></button>
    <button class="shade-btn" data-r="76" data-g="175" data-b="80" style="background:#4CAF50"><span>зелёный</span></button>
    <button class="shade-btn" data-r="33" data-g="150" data-b="243" style="background:#2196F3"><span>синий</span></button>
    <button class="shade-btn" data-r="30" data-g="25" data-b="25" style="background:#1a1a1a;border-color:rgba(255,255,255,.15)"><span>чёрный</span></button>
  </div>
  <div class="divider"></div>
  <div class="slider-row">
    <label>Насыщенность</label>
    <input type="range" id="opSlider" min="20" max="90" value="65">
    <span id="opVal">65%</span>
  </div>
  <div style="margin-top:10px;font-size:13px;color:#8a837a">
    Цветотип: <span id="ct" class="ct" style="display:none"></span><span id="ctNone">определяется...</span>
  </div>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');

let R=196, G=149, B=106, opacity=0.65;
let landmarker, lastTime=-1;
let skinSamples=[], colortype=null, frame=0;

// Выбор оттенка
document.getElementById('shades').addEventListener('click', e => {
  const btn = e.target.closest('.shade-btn'); if(!btn) return;
  document.querySelectorAll('.shade-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  R=+btn.dataset.r; G=+btn.dataset.g; B=+btn.dataset.b;
});
document.getElementById('opSlider').addEventListener('input', function(){
  opacity=this.value/100;
  document.getElementById('opVal').textContent=this.value+'%';
});

// Инициализация — берём точно из emotion-tracker.html
async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  landmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numFaces: 1,
    outputFaceBlendshapes: false,
  });

  document.getElementById('status').textContent = 'Запрос камеры...';
  const stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
  video.srcObject = stream;
  video.addEventListener('loadeddata', () => {
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    document.getElementById('status').textContent = 'Работает ✓';
    requestAnimationFrame(loop);
  });
}

function loop() {
  if(video.currentTime !== lastTime && video.readyState >= 2) {
    lastTime = video.currentTime;
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;

    const res = landmarker.detectForVideo(video, performance.now());
    ctx.clearRect(0, 0, overlay.width, overlay.height);

    if(res.faceLandmarks && res.faceLandmarks.length > 0) {
      const lm = res.faceLandmarks[0];
      drawLips(lm);
      frame++;
      if(frame % 20 === 0) analyzeSkin(lm);
    }
  }
  requestAnimationFrame(loop);
}

// Рисуем губы через те же соединения что использует DrawingUtils
// FACE_LANDMARKS_LIPS — берём все точки и строим путь через соединения
function drawLips(lm) {
  const W = overlay.width, H = overlay.height;
  const connections = FaceLandmarker.FACE_LANDMARKS_LIPS;

  // Строим граф соединений
  const adj = {};
  for(const {start, end} of connections) {
    if(!adj[start]) adj[start] = [];
    if(!adj[end]) adj[end] = [];
    adj[start].push(end);
    adj[end].push(start);
  }

  // Обходим граф чтобы построить замкнутый путь
  // Начинаем с точки 61 (левый угол)
  function buildPath(startIdx, visited) {
    const path = [startIdx];
    visited.add(startIdx);
    let cur = startIdx;
    while(true) {
      const neighbors = (adj[cur]||[]).filter(n => !visited.has(n));
      if(neighbors.length === 0) break;
      const next = neighbors[0];
      visited.add(next);
      path.push(next);
      cur = next;
    }
    return path;
  }

  const visited = new Set();
  // Внешний контур — обходим от 61
  const outerPath = buildPath(61, visited);

  ctx.save();
  ctx.beginPath();
  const first = lm[outerPath[0]];
  ctx.moveTo(first.x * W, first.y * H);
  for(let i = 1; i < outerPath.length; i++) {
    const p = lm[outerPath[i]];
    ctx.lineTo(p.x * W, p.y * H);
  }
  ctx.closePath();
  ctx.fillStyle = `rgba(${R},${G},${B},${opacity})`;
  ctx.fill();

  // Продолжаем обход для оставшихся точек (внутренний контур — вырезаем если рот открыт)
  const innerPath = buildPath(78, new Set([...visited].filter(x => outerPath.includes(x) ? false : false)));
  // Получаем все непосещённые точки
  const allIndices = new Set();
  for(const {start,end} of connections) { allIndices.add(start); allIndices.add(end); }
  const remaining = [...allIndices].filter(i => !visited.has(i));

  if(remaining.length > 2) {
    // Строим внутренний путь
    const innerVisited = new Set(visited);
    const inner = buildPath(remaining[0], innerVisited);

    // Проверяем открыт ли рот
    const mouthOpen = Math.abs(lm[13].y - lm[14].y) * H;
    const lipH = Math.abs(lm[0].y - lm[17].y) * H;
    if(mouthOpen > lipH * 0.15) {
      ctx.beginPath();
      const fp = lm[inner[0]];
      ctx.moveTo(fp.x * W, fp.y * H);
      for(let i = 1; i < inner.length; i++) {
        const p = lm[inner[i]];
        ctx.lineTo(p.x * W, p.y * H);
      }
      ctx.closePath();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }
  }

  // Блик
  const cx = (lm[61].x + lm[291].x)/2 * W;
  const cy = (lm[61].y + lm[291].y)/2 * H;
  const lipW = Math.abs(lm[291].x - lm[61].x) * W;
  const gR = lipW * 0.18;
  const gY = lm[0].y * H + (cy - lm[0].y*H) * 0.3;
  const grad = ctx.createRadialGradient(cx,gY,0,cx,gY,gR);
  grad.addColorStop(0, `rgba(255,255,255,${opacity*0.45})`);
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.ellipse(cx,gY,gR,gR*0.38,0,0,Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function analyzeSkin(lm) {
  const W=overlay.width, H=overlay.height;
  const off=document.createElement('canvas');
  off.width=W; off.height=H;
  const octx=off.getContext('2d');
  octx.translate(W,0); octx.scale(-1,1);
  octx.drawImage(video,0,0,W,H);
  let tR=0,tG=0,tB=0,cnt=0;
  [lm[234],lm[454],lm[116],lm[345]].forEach(p=>{
    const px=Math.round(p.x*W),py=Math.round(p.y*H);
    try{
      const id=octx.getImageData(px-5,py-5,10,10);
      for(let i=0;i<id.data.length;i+=4){tR+=id.data[i];tG+=id.data[i+1];tB+=id.data[i+2];cnt++;}
    }catch(e){}
  });
  if(!cnt) return;
  const w=(tR-tB)/(tR+tB+cnt);
  skinSamples.push(w);
  if(skinSamples.length>60) skinSamples.shift();
  if(skinSamples.length<15) return;
  const avg=skinSamples.reduce((s,x)=>s+x,0)/skinSamples.length;
  const ct=avg>0.10?'warm':avg<0.04?'cool':'neutral';
  if(ct===colortype) return;
  colortype=ct;
  const map={warm:['ct-warm','☀️ тёплый'],cool:['ct-cool','❄️ холодный'],neutral:['ct-neutral','⚖️ нейтральный']};
  const [cls,label]=map[ct];
  const el=document.getElementById('ct');
  el.className='ct '+cls; el.textContent=label; el.style.display='inline';
  document.getElementById('ctNone').style.display='none';
}

init().catch(e => {
  document.getElementById('status').textContent = 'Ошибка: ' + e.message;
});
</script>
</body>
</html>
