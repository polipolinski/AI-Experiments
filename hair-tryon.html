<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тонировка волос — AI Beauty</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #0f0d0c; color: #f0ece6; display: flex; flex-direction: column; align-items: center; padding: 1rem; min-height: 100vh; }
  h1 { font-size: 22px; font-weight: 400; font-family: Georgia, serif; margin-bottom: 1rem; }
  h1 em { font-style: italic; color: #e8927a; }
  .video-wrap { position: relative; width: 100%; max-width: 520px; }
  video { width: 100%; display: block; transform: scaleX(-1); visibility: hidden; position: absolute; }
  canvas#output { width: 100%; display: block; transform: scaleX(-1); border-radius: 12px; background:#000; }
  .status { font-size: 13px; color: #8a837a; margin: 8px 0; text-align: center; }
  .controls { width: 100%; max-width: 520px; background: #1a1714; border-radius: 12px; padding: 1rem; margin-top: 12px; }
  .ctrl-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #5c5650; margin-bottom: 10px; }
  .colors { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding-bottom: 16px; }
  .color-btn { width: 44px; height: 44px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; position: relative; flex-shrink: 0; transition: transform .15s; }
  .color-btn:hover { transform: scale(1.1); }
  .color-btn.on { border-color: #fff; transform: scale(1.08); }
  .color-btn span { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #5c5650; white-space: nowrap; }
  .slider-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .slider-row label { font-size: 12px; color: #8a837a; min-width: 90px; }
  .slider-row input { flex: 1; accent-color: #c9705a; }
  .slider-row span { font-size: 12px; color: #8a837a; min-width: 34px; text-align: right; }
</style>
</head>
<body>
<h1>Тонировка <em>волос</em></h1>
<div class="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="output"></canvas>
</div>
<div class="status" id="status">Загрузка модели сегментации...</div>

<div class="controls">
  <div class="ctrl-label">Натуральные</div>
  <div class="colors" id="colorGridNatural">
    <button class="color-btn on" data-color="230,222,205" style="background:#E6DECD"><span>платиновый</span></button>
    <button class="color-btn" data-color="212,178,128" style="background:#D4B280"><span>блонд</span></button>
    <button class="color-btn" data-color="196,148,90" style="background:#C4945A"><span>карамельный</span></button>
    <button class="color-btn" data-color="139,111,71" style="background:#8B6F47"><span>русый</span></button>
    <button class="color-btn" data-color="181,72,30" style="background:#B5481E"><span>рыжий</span></button>
    <button class="color-btn" data-color="122,66,38" style="background:#7A4226"><span>каштановый</span></button>
    <button class="color-btn" data-color="92,58,40" style="background:#5C3A28"><span>шатен</span></button>
    <button class="color-btn" data-color="68,38,32" style="background:#442620"><span>кофейный</span></button>
    <button class="color-btn" data-color="150,150,148" style="background:#969694"><span>пепельный</span></button>
    <button class="color-btn" data-color="43,24,16" style="background:#2B1810"><span>брюн</span></button>
    <button class="color-btn" data-color="20,18,17" style="background:#141211"><span>чёрный</span></button>
  </div>

  <div class="divider"></div>
  <div class="ctrl-label">Яркие</div>
  <div class="colors" id="colorGridVivid">
    <button class="color-btn" data-color="180,158,212" style="background:#B49ED4"><span>лавандовый</span></button>
    <button class="color-btn" data-color="232,160,190" style="background:#E8A0BE"><span>розовый</span></button>
    <button class="color-btn" data-color="96,18,38" style="background:#601226"><span>бордовый</span></button>
    <button class="color-btn" data-color="108,62,168" style="background:#6C3EA8"><span>фиолетовый</span></button>
    <button class="color-btn" data-color="58,95,168" style="background:#3A5FA8"><span>синий</span></button>
    <button class="color-btn" data-color="40,170,180" style="background:#28AAB4"><span>бирюзовый</span></button>
    <button class="color-btn" data-color="60,140,90" style="background:#3C8C5A"><span>зелёный</span></button>
  </div>
  <div class="slider-row">
    <label>Интенсивность</label>
    <input type="range" id="intensitySlider" min="20" max="95" value="70">
    <span id="intensityVal">70%</span>
  </div>
</div>

<script type="module">
import { ImageSegmenter, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById('video');
const output = document.getElementById('output');
const ctx = output.getContext('2d', { willReadFrequently: true });

let tintColor = [212, 178, 128];
let intensity = 0.7;
let segmenter, lastTime = -1;

document.querySelectorAll('#colorGridNatural, #colorGridVivid').forEach(grid => {
  grid.addEventListener('click', e => {
    const btn = e.target.closest('.color-btn'); if(!btn) return;
    document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    tintColor = btn.dataset.color.split(',').map(Number);
  });
});
document.getElementById('intensitySlider').addEventListener('input', function(){
  intensity = this.value/100;
  document.getElementById('intensityVal').textContent = this.value+'%';
});

async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  segmenter = await ImageSegmenter.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/latest/selfie_multiclass_256x256.tflite",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    outputCategoryMask: true,
    outputConfidenceMasks: false
  });

  document.getElementById('status').textContent = 'Запрос камеры...';
  const stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
  video.srcObject = stream;
  video.addEventListener('loadeddata', () => {
    output.width = video.videoWidth;
    output.height = video.videoHeight;
    document.getElementById('status').textContent = 'Работает ✓';
    requestAnimationFrame(loop);
  });
}

function loop() {
  if(video.currentTime !== lastTime && video.readyState >= 2) {
    lastTime = video.currentTime;
    output.width = video.videoWidth;
    output.height = video.videoHeight;

    segmenter.segmentForVideo(video, performance.now(), (result) => {
      renderFrame(result);
    });
  }
  requestAnimationFrame(loop);
}

// Категории модели: 0-background 1-hair 2-body-skin 3-face-skin 4-clothes 5-others
const HAIR_CATEGORY = 1;

function renderFrame(result) {
  const W = output.width, H = output.height;

  // Рисуем оригинальное видео
  ctx.drawImage(video, 0, 0, W, H);

  const mask = result.categoryMask;
  if (!mask) return;

  const maskData = mask.getAsUint8Array();
  const mW = mask.width, mH = mask.height;

  // Получаем текущий кадр как imageData чтобы тонировать волосы
  let imgData;
  try {
    imgData = ctx.getImageData(0, 0, W, H);
  } catch(e) { mask.close(); return; }
  const data = imgData.data;

  const [tr, tg, tb] = tintColor;
  const scaleX = mW / W, scaleY = mH / H;

  for (let y = 0; y < H; y++) {
    const my = Math.min(mH - 1, Math.floor(y * scaleY));
    for (let x = 0; x < W; x++) {
      const mx = Math.min(mW - 1, Math.floor(x * scaleX));
      const category = maskData[my * mW + mx];
      if (category === HAIR_CATEGORY) {
        const idx = (y * W + x) * 4;
        const r = data[idx], g = data[idx+1], b = data[idx+2];
        data[idx]   = r + (tr - r) * intensity;
        data[idx+1] = g + (tg - g) * intensity;
        data[idx+2] = b + (tb - b) * intensity;
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);
  mask.close();
}

init().catch(e => {
  document.getElementById('status').textContent = 'Ошибка: ' + e.message;
  console.error(e);
});
</script>
</body>
</html>
