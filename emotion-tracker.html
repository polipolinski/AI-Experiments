<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Emotion Tracker — распознавание эмоций по лицу</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #f0f1f3;
    color: #2b2b2b;
    padding: 24px;
  }
  h1 { font-size: 20px; margin-bottom: 16px; }
  h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #444; }
  .card {
    background: #fff;
    border-radius: 10px;
    padding: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    margin-bottom: 18px;
  }
  .status { font-size: 13px; color: #777; float: right; }
  .video-wrap {
    position: relative;
    width: 640px;
    max-width: 100%;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }
  video { width: 100%; display: block; transform: scaleX(-1); }
  canvas.overlay {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
    pointer-events: none;
  }
  .pose-label {
    position: absolute; top: 8px; left: 10px;
    font: 12px monospace; color: #7CFC00;
    text-shadow: 0 0 3px #000;
  }
  .legend { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .metric {
    background: #fafafa;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .metric .row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .metric .name { font-size: 13px; color: #666; }
  .metric .val { font-size: 18px; font-weight: 600; }
  .bar { height: 6px; background: #e7e8ea; border-radius: 3px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; background: #4a8af4; border-radius: 3px; transition: width .15s; }
  .emotion-main {
    font-size: 34px; font-weight: 700; text-align: center; margin: 6px 0 14px;
  }
  .emotion-main small { display:block; font-size: 13px; font-weight: 400; color: #888; margin-top: 4px; }
  .emo .bar > i { background: #f4a84a; }
  .stats { display: flex; gap: 28px; flex-wrap: wrap; font-size: 14px; }
  .stats b { font-size: 20px; }
  .error { color: #c0392b; padding: 12px; }
</style>
</head>
<body>

<div class="card">
  <span class="status" id="status">Загрузка модели…</span>
  <h2>Камера</h2>
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas class="overlay" id="overlay"></canvas>
    <div class="pose-label" id="pose"></div>
  </div>
  <div class="legend">Жёлтый — овал лица · красный — брови · зелёный — глаза · фиолетовый — губы · голубой — радужки</div>
</div>

<div class="card">
  <h2>Эмоция</h2>
  <div class="emotion-main" id="emotionMain">—<small>наведите камеру на лицо</small></div>
  <div class="grid emo" id="emotions"></div>
</div>

<div class="card">
  <h2>Метрики лица</h2>
  <div class="grid" id="metrics"></div>
</div>

<div class="card">
  <h2>Моргание и голова</h2>
  <div class="stats">
    <div>Морганий всего: <b id="blinkTotal">0</b></div>
    <div>Морганий/мин: <b id="blinkRate">0</b></div>
    <div>Pitch (кивок): <b id="pitch">0°</b></div>
    <div>Yaw (поворот): <b id="yaw">0°</b></div>
    <div>Roll (наклон): <b id="roll">0°</b></div>
  </div>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver, DrawingUtils }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const statusEl = $("status");

// ---------- Конфигурация метрик (имя → функция от blendshapes) ----------
const METRICS = [
  ["Напряжение бровей", b => Math.max(b.browDownLeft, b.browDownRight)],
  ["Поднятие бровей (лоб)", b => Math.max(b.browInnerUp, b.browOuterUpLeft, b.browOuterUpRight)],
  ["Закрытие глаз", b => (b.eyeBlinkLeft + b.eyeBlinkRight) / 2],
  ["Прищур", b => (b.eyeSquintLeft + b.eyeSquintRight) / 2],
  ["Напряжение челюсти", b => Math.max(b.mouthPressLeft, b.mouthPressRight, b.jawForward)],
  ["Открытие рта", b => b.jawOpen],
  ["Улыбка", b => (b.mouthSmileLeft + b.mouthSmileRight) / 2],
  ["Хмурость рта", b => (b.mouthFrownLeft + b.mouthFrownRight) / 2],
];

// ---------- Эмоции: эвристики на основе blendshapes ----------
const EMOTIONS = [
  ["Радость 🙂", b => 1.6 * (b.mouthSmileLeft + b.mouthSmileRight) / 2 + 0.4 * (b.cheekSquintLeft + b.cheekSquintRight) / 2],
  ["Удивление 😮", b => 0.7 * b.browInnerUp + 0.5 * (b.eyeWideLeft + b.eyeWideRight) / 2 + 0.6 * b.jawOpen],
  ["Злость 😠", b => 1.2 * (b.browDownLeft + b.browDownRight) / 2 + 0.4 * (b.mouthPressLeft + b.mouthPressRight) / 2 + 0.3 * (b.eyeSquintLeft + b.eyeSquintRight) / 2],
  ["Грусть 😢", b => 0.6 * b.browInnerUp + 1.0 * (b.mouthFrownLeft + b.mouthFrownRight) / 2 + 0.3 * (b.mouthLowerDownLeft + b.mouthLowerDownRight) / 2],
  ["Страх 😨", b => 0.5 * (b.eyeWideLeft + b.eyeWideRight) / 2 + 0.4 * b.browInnerUp + 0.5 * (b.mouthStretchLeft + b.mouthStretchRight) / 2],
  ["Отвращение 🤢", b => 1.3 * (b.noseSneerLeft + b.noseSneerRight) / 2 + 0.4 * (b.mouthUpperUpLeft + b.mouthUpperUpRight) / 2],
];
const NEUTRAL_THRESHOLD = 0.18;

// ---------- Построение UI ----------
function makeTiles(containerId, names) {
  const c = $(containerId);
  return names.map(name => {
    const d = document.createElement("div");
    d.className = "metric";
    d.innerHTML = `<div class="row"><span class="name">${name}</span><span class="val">0%</span></div><div class="bar"><i></i></div>`;
    c.appendChild(d);
    return { val: d.querySelector(".val"), bar: d.querySelector("i") };
  });
}
const metricTiles = makeTiles("metrics", METRICS.map(m => m[0]));
const emotionTiles = makeTiles("emotions", EMOTIONS.map(e => e[0]).concat(["Нейтрально 😐"]));

// ---------- Инициализация MediaPipe ----------
let landmarker, video = $("video"), overlay = $("overlay"), ctx = overlay.getContext("2d");

async function init() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    landmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numFaces: 1,
      outputFaceBlendshapes: true,
      outputFacialTransformationMatrixes: true
    });
    statusEl.textContent = "Запрос доступа к камере…";
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
      statusEl.textContent = "Работает ✓";
      requestAnimationFrame(loop);
    });
  } catch (e) {
    statusEl.textContent = "Ошибка";
    document.body.insertAdjacentHTML("afterbegin",
      `<div class="card error">Не удалось запустить: ${e.message}.<br>
       Разрешите доступ к камере. Если открываете файл с диска и камера не работает —
       запустите локальный сервер: <code>python -m http.server</code> и откройте
       <code>http://localhost:8000/emotion-tracker.html</code></div>`);
    console.error(e);
  }
}

// ---------- Моргание ----------
let blinkTotal = 0, eyesClosed = false, blinkTimes = [];
function trackBlinks(closure, now) {
  if (!eyesClosed && closure > 0.5) { eyesClosed = true; }
  else if (eyesClosed && closure < 0.3) {
    eyesClosed = false;
    blinkTotal++;
    blinkTimes.push(now);
  }
  blinkTimes = blinkTimes.filter(t => now - t < 60000);
  $("blinkTotal").textContent = blinkTotal;
  $("blinkRate").textContent = blinkTimes.length;
}

// ---------- Положение головы из матрицы трансформации ----------
function headPose(m) {
  // m — 4x4 column-major
  const R00 = m[0], R10 = m[1], R20 = m[2],
        R21 = m[6], R22 = m[10];
  const pitch = Math.atan2(R21, R22) * 180 / Math.PI;
  const yaw   = Math.atan2(-R20, Math.hypot(R21, R22)) * 180 / Math.PI;
  const roll  = Math.atan2(R10, R00) * 180 / Math.PI;
  return { pitch, yaw, roll };
}

// ---------- Сглаживание ----------
const smooth = {};
function ema(key, value, a = 0.3) {
  smooth[key] = smooth[key] === undefined ? value : smooth[key] + a * (value - smooth[key]);
  return smooth[key];
}

// ---------- Главный цикл ----------
let lastVideoTime = -1;
function loop() {
  const now = performance.now();
  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    const res = landmarker.detectForVideo(video, now);
    ctx.clearRect(0, 0, overlay.width, overlay.height);

    if (res.faceLandmarks?.length) {
      drawFace(res.faceLandmarks[0]);

      // blendshapes → объект {имя: значение}
      const b = {};
      for (const c of res.faceBlendshapes[0].categories) b[c.categoryName] = c.score;

      // Метрики
      METRICS.forEach(([name, fn], i) => {
        const v = Math.round(ema("m" + i, fn(b)) * 100);
        metricTiles[i].val.textContent = v + "%";
        metricTiles[i].bar.style.width = v + "%";
      });

      // Эмоции
      const scores = EMOTIONS.map(([name, fn], i) => ema("e" + i, Math.min(1, fn(b))));
      const maxScore = Math.max(...scores);
      const neutral = Math.max(0, 1 - maxScore * 2.2);
      const all = [...scores, neutral];
      const names = [...EMOTIONS.map(e => e[0]), "Нейтрально 😐"];
      all.forEach((s, i) => {
        const v = Math.round(s * 100);
        emotionTiles[i].val.textContent = v + "%";
        emotionTiles[i].bar.style.width = v + "%";
      });
      const top = maxScore < NEUTRAL_THRESHOLD ? "Нейтрально 😐" : names[scores.indexOf(maxScore)];
      $("emotionMain").innerHTML = top + `<small>уверенность ${Math.round((maxScore < NEUTRAL_THRESHOLD ? neutral : maxScore) * 100)}%</small>`;

      // Моргание
      trackBlinks((b.eyeBlinkLeft + b.eyeBlinkRight) / 2, now);

      // Голова
      if (res.facialTransformationMatrixes?.length) {
        const p = headPose(res.facialTransformationMatrixes[0].data);
        $("pitch").textContent = p.pitch.toFixed(0) + "°";
        $("yaw").textContent = (-p.yaw).toFixed(0) + "°";
        $("roll").textContent = p.roll.toFixed(0) + "°";
        $("pose").textContent = `pitch ${p.pitch.toFixed(1)}  yaw ${(-p.yaw).toFixed(1)}  roll ${p.roll.toFixed(1)}`;
      }
    } else {
      $("emotionMain").innerHTML = "—<small>лицо не найдено</small>";
    }
  }
  requestAnimationFrame(loop);
}

// ---------- Отрисовка сетки лица ----------
function drawFace(lm) {
  const du = new DrawingUtils(ctx);
  du.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_FACE_OVAL, { color: "#E8C547", lineWidth: 2 });
  du.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_LEFT_EYEBROW, { color: "#E05548", lineWidth: 2 });
  du.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYEBROW, { color: "#E05548", lineWidth: 2 });
  du.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE, { color: "#4CAF50", lineWidth: 2 });
  du.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE, { color: "#4CAF50", lineWidth: 2 });
  du.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_LIPS, { color: "#9C5BD0", lineWidth: 2 });
  du.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_LEFT_IRIS, { color: "#40C4FF", lineWidth: 2 });
  du.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_RIGHT_IRIS, { color: "#40C4FF", lineWidth: 2 });
}

init();
</script>
</body>
</html>
