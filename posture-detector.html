<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Детектор осанки</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  .app { width: 100%; max-width: 640px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  #status-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding: 10px 14px; border-radius: 10px; background: #fff; border: 1px solid #e0e0d8; font-size: 14px; color: #555; }
  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
  .video-wrap { position: relative; width: 100%; border-radius: 14px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
  video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
  #alert-overlay { display: none; position: absolute; inset: 0; border: 3px solid #D85A30; border-radius: 14px; pointer-events: none; background: rgba(216,90,48,0.10); }
  #alert-label { display: none; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: #D85A30; color: #fff; font-size: 13px; font-weight: 600; padding: 6px 18px; border-radius: 20px; white-space: nowrap; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
  .metric { background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; padding: 12px; text-align: center; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-val { font-size: 20px; font-weight: 600; }
  .metric-bar-bg { height: 4px; border-radius: 2px; background: #e8e8e0; margin-top: 8px; }
  .metric-bar { height: 100%; border-radius: 2px; background: #aaa; width: 0%; transition: width .15s, background .15s; }
  .controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  button { padding: 9px 20px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer; transition: background .15s; }
  button:hover { background: #f0f0e8; }
  .sens-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; }
  .mute-wrap { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666; cursor: pointer; }
  #alerts-log { margin-top: 10px; font-size: 12px; color: #888; min-height: 18px; }
  #btn-stop { display: none; }
  .timer-box { margin-top: 12px; padding: 12px 14px; background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #666; }
  .timer-box b { font-size: 18px; color: #1a1a1a; }
</style>
</head>
<body>
<div class="app">
  <h1>Детектор осанки за компьютером</h1>

  <div id="status-bar">
    <span id="status-dot"></span>
    <span id="status-text">Нажми «Включить камеру» и сядь прямо для калибровки</span>
  </div>

  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="alert-overlay"></div>
    <div id="alert-label"></div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Наклон головы вперёд</div>
      <div class="metric-val" id="m-forward">—</div>
      <div class="metric-bar-bg"><div class="metric-bar" id="bar-forward"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Перекос плеч</div>
      <div class="metric-val" id="m-tilt">—</div>
      <div class="metric-bar-bg"><div class="metric-bar" id="bar-tilt"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Сутулость (плечи вверх)</div>
      <div class="metric-val" id="m-hunch">—</div>
      <div class="metric-bar-bg"><div class="metric-bar" id="bar-hunch"></div></div>
    </div>
  </div>

  <div class="timer-box">
    <span>Время с хорошей осанкой</span>
    <span><b id="goodTime">0:00</b> из <span id="totalTime">0:00</span></span>
  </div>

  <div class="controls">
    <button id="btn-start" onclick="startCamera()">Включить камеру</button>
    <button id="btn-stop" onclick="stopCamera()">Остановить</button>
    <div class="sens-wrap">
      Чувствительность
      <input type="range" id="sens" min="1" max="10" value="5" step="1" style="width:90px;" oninput="updateSens(this.value)">
      <span id="sens-val" style="font-weight:600;min-width:14px;">5</span>
    </div>
    <label class="mute-wrap">
      <input type="checkbox" id="mute"> Без звука
    </label>
  </div>

  <div id="alerts-log"></div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

let camera = null, stream = null, audioCtx = null;
let alertCooldown = 0, sensitivity = 5, alertCount = 0;
let running = false, landmarker = null;
let baselineSet = false, calibFrames = 0;
const CALIB_NEEDED = 40;

// Базовые значения, усредняемые во время калибровки
let baseline = { forwardRatio: null, shoulderY: null, neckLen: null };

let goodSeconds = 0, totalSeconds = 0, lastTick = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

window.updateSens = function(v) {
  sensitivity = parseInt(v);
  document.getElementById('sens-val').textContent = v;
};

function setStatus(text, color) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').style.background = color || '#aaa';
}

function playBeep(freq, duration, type) {
  if (document.getElementById('mute').checked) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

function dist(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

function showAlert(label, isWarn) {
  const ov = document.getElementById('alert-overlay');
  const lb = document.getElementById('alert-label');
  const color = isWarn ? '#BA7517' : '#D85A30';
  ov.style.display = 'block';
  ov.style.borderColor = color;
  ov.style.background = isWarn ? 'rgba(186,117,23,0.10)' : 'rgba(216,90,48,0.10)';
  lb.style.display = 'block';
  lb.style.background = color;
  lb.textContent = label;
  alertCount++;
  const t = new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('alerts-log').textContent = `Последнее: ${t} — ${label} (всего: ${alertCount})`;
  setTimeout(() => { ov.style.display='none'; lb.style.display='none'; }, 1200);
}

function updateMetric(id, barId, value, threshold) {
  const pct = Math.min(100, Math.round(value * 100));
  document.getElementById(id).textContent = pct + '%';
  const bar = document.getElementById(barId);
  bar.style.width = pct + '%';
  bar.style.background = value > threshold ? '#D85A30' : value > threshold * 0.7 ? '#BA7517' : '#1D9E75';
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// Индексы PoseLandmarker: 0=нос, 7=левое ухо, 8=правое ухо, 11=левое плечо, 12=правое плечо
function onResults(result) {
  if (!result.landmarks || !result.landmarks.length) {
    setStatus('Тело не обнаружено — сядь так, чтобы плечи были в кадре', '#BA7517');
    return;
  }
  const lm = result.landmarks[0];
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;

  const nose = lm[0];
  const leftEar = lm[7], rightEar = lm[8];
  const leftShoulder = lm[11], rightShoulder = lm[12];

  const earMidX = (leftEar.x + rightEar.x) / 2;
  const earMidY = (leftEar.y + rightEar.y) / 2;
  const shoulderMidX = (leftShoulder.x + rightShoulder.x) / 2;
  const shoulderMidY = (leftShoulder.y + rightShoulder.y) / 2;
  const shoulderWidth = dist(leftShoulder, rightShoulder);

  // Длина "шеи" в проекции (от середины плеч до середины ушей) нормированная на ширину плеч —
  // когда голова выдвигается вперёд (к камере), в 2D-проекции она визуально опускается ближе к плечам
  // и горизонтальное смещение между ухом и плечом увеличивается (наклон вперёд = голова ближе к камере = крупнее и ниже)
  const neckVertical = shoulderMidY - earMidY; // вертикальное расстояние плечи-уши
  const forwardOffsetRaw = Math.abs(earMidX - shoulderMidX) / (shoulderWidth || 0.01);

  const thresh = (11 - sensitivity) / 10;

  if (!baselineSet) {
    if (calibFrames === 0) setStatus('Сядь прямо — калибровка осанки...', '#378ADD');
    if (calibFrames < CALIB_NEEDED) {
      baseline.forwardRatio = baseline.forwardRatio === null ? forwardOffsetRaw : baseline.forwardRatio * 0.9 + forwardOffsetRaw * 0.1;
      baseline.shoulderY = baseline.shoulderY === null ? shoulderMidY : baseline.shoulderY * 0.9 + shoulderMidY * 0.1;
      baseline.neckLen = baseline.neckLen === null ? neckVertical : baseline.neckLen * 0.9 + neckVertical * 0.1;
      calibFrames++;
      drawSkeleton(lm);
      return;
    }
    baselineSet = true;
    setStatus('Активно — следим за осанкой', '#1D9E75');
    lastTick = performance.now();
  }

  // Наклон головы вперёд: шея визуально "укорачивается" относительно калибровки
  const neckShrink = baseline.neckLen > 0 ? (baseline.neckLen - neckVertical) / baseline.neckLen : 0;
  const forwardScore = Math.max(0, Math.min(1, neckShrink * 3));

  // Перекос плеч: разница высот левого и правого плеча относительно ширины плеч
  const shoulderTiltRaw = Math.abs(leftShoulder.y - rightShoulder.y) / (shoulderWidth || 0.01);
  const tiltScore = Math.max(0, Math.min(1, shoulderTiltRaw * 4));

  // Сутулость: плечи поднимаются к ушам относительно калибровки (визуально "проседает" верх корпуса —
  // приближение к камере или подъём плеч уменьшает shoulderMidY относительно базового)
  const hunchRaw = baseline.shoulderY > 0 ? (baseline.shoulderY - shoulderMidY) / (shoulderWidth || 0.01) : 0;
  const hunchScore = Math.max(0, Math.min(1, Math.abs(hunchRaw) * 2));

  const adjT = thresh * 0.7;
  updateMetric('m-forward', 'bar-forward', forwardScore, adjT);
  updateMetric('m-tilt', 'bar-tilt', tiltScore, adjT);
  updateMetric('m-hunch', 'bar-hunch', hunchScore, adjT);

  // Тайм-трекинг
  const now = performance.now();
  if (lastTick) {
    const dt = (now - lastTick) / 1000;
    totalSeconds += dt;
    const isGood = forwardScore < adjT && tiltScore < adjT && hunchScore < adjT;
    if (isGood) goodSeconds += dt;
    document.getElementById('goodTime').textContent = formatTime(goodSeconds);
    document.getElementById('totalTime').textContent = formatTime(totalSeconds);
  }
  lastTick = now;

  drawSkeleton(lm);

  if (alertCooldown > 0) { alertCooldown--; return; }

  if (forwardScore > adjT && forwardScore >= tiltScore && forwardScore >= hunchScore) {
    showAlert('Голова уходит вперёд — выпрямись!', false);
    playBeep(440, 0.35, 'sine');
    alertCooldown = 90;
  } else if (tiltScore > adjT && tiltScore >= hunchScore) {
    showAlert('Плечи перекошены — выровняйся!', true);
    playBeep(520, 0.3, 'triangle');
    alertCooldown = 90;
  } else if (hunchScore > adjT) {
    showAlert('Сутулишься — расправь плечи!', true);
    playBeep(380, 0.3, 'triangle');
    alertCooldown = 90;
  }
}

function drawSkeleton(lm) {
  const du = new DrawingUtils(ctx);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Рисуем только верхнюю часть тела: плечи, шея, голова — упрощённо линиями
  const W = canvas.width, H = canvas.height;
  const pts = (i) => [lm[i].x * W, lm[i].y * H];

  ctx.strokeStyle = 'rgba(29,158,117,0.85)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(...pts(11));
  ctx.lineTo(...pts(12));
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(...pts(11));
  ctx.lineTo(...pts(7));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(...pts(12));
  ctx.lineTo(...pts(8));
  ctx.stroke();

  [0, 7, 8, 11, 12].forEach(i => {
    const [x, y] = pts(i);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#1D9E75';
    ctx.fill();
  });
}

window.startCamera = async function() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    video.srcObject = stream;
    setStatus('Загрузка модели позы...', '#378ADD');
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';

    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    landmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1,
      minPoseDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    running = true;
    baselineSet = false; calibFrames = 0;
    baseline = { forwardRatio: null, shoulderY: null, neckLen: null };
    goodSeconds = 0; totalSeconds = 0; lastTick = null;

    function onVideoReady() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      loop();
    }

    if (video.readyState >= 2 && video.videoWidth > 0) {
      onVideoReady();
    } else {
      video.addEventListener('loadeddata', onVideoReady, { once: true });
    }
  } catch(e) {
    setStatus('Ошибка доступа к камере: ' + e.message, '#D85A30');
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
  }
};

let lastVideoTime = -1;
function loop() {
  if (!running) return;
  if (video.currentTime !== lastVideoTime && video.readyState >= 2) {
    lastVideoTime = video.currentTime;
    try {
      const result = landmarker.detectForVideo(video, performance.now());
      onResults(result);
    } catch (e) {
      console.error('detectForVideo failed:', e);
      setStatus('Ошибка обработки кадра: ' + e.message, '#D85A30');
    }
  }
  requestAnimationFrame(loop);
}

window.stopCamera = function() {
  running = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (landmarker) { landmarker.close(); landmarker = null; }
  video.srcObject = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  baselineSet = false; calibFrames = 0;
  document.getElementById('btn-start').style.display = 'inline-block';
  document.getElementById('btn-stop').style.display = 'none';
  ['m-forward','m-tilt','m-hunch'].forEach(id => document.getElementById(id).textContent = '—');
  ['bar-forward','bar-tilt','bar-hunch'].forEach(id => document.getElementById(id).style.width = '0%');
  setStatus('Остановлено', '#aaa');
};
</script>
</body>
</html>
