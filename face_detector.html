<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Детектор напряжения лица</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  .app { width: 100%; max-width: 640px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  #status-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding: 10px 14px; border-radius: 10px; background: #fff; border: 1px solid #e0e0d8; font-size: 14px; color: #555; }
  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
  .video-wrap { position: relative; width: 100%; border-radius: 14px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
  video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
  #alert-overlay { display: none; position: absolute; inset: 0; border: 3px solid #D85A30; border-radius: 14px; pointer-events: none; background: rgba(216,90,48,0.12); }
  #alert-label { display: none; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: #D85A30; color: #fff; font-size: 13px; font-weight: 600; padding: 6px 18px; border-radius: 20px; white-space: nowrap; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
  .metric { background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; padding: 12px; text-align: center; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-val { font-size: 20px; font-weight: 600; }
  .metric-bar-bg { height: 4px; border-radius: 2px; background: #e8e8e0; margin-top: 8px; }
  .metric-bar { height: 100%; border-radius: 2px; background: #aaa; width: 0%; transition: width .15s, background .15s; }
  .controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  button { padding: 9px 20px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer; transition: background .15s; }
  button:hover { background: #f0f0e8; }
  .sens-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; }
  .mute-wrap { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666; cursor: pointer; }
  #alerts-log { margin-top: 10px; font-size: 12px; color: #888; min-height: 18px; }
  #btn-stop { display: none; }
</style>
</head>
<body>
<div class="app">
  <h1>Детектор напряжения лица</h1>

  <div id="status-bar">
    <span id="status-dot"></span>
    <span id="status-text">Нажми «Включить камеру» для начала</span>
  </div>

  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="alert-overlay"></div>
    <div id="alert-label"></div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Нахмуривание</div>
      <div class="metric-val" id="m-brow">—</div>
      <div class="metric-bar-bg"><div class="metric-bar" id="bar-brow"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Прищуривание</div>
      <div class="metric-val" id="m-squint">—</div>
      <div class="metric-bar-bg"><div class="metric-bar" id="bar-squint"></div></div>
    </div>
    <div class="metric">
      <div class="metric-label">Сморщивание</div>
      <div class="metric-val" id="m-scrunch">—</div>
      <div class="metric-bar-bg"><div class="metric-bar" id="bar-scrunch"></div></div>
    </div>
  </div>

  <div class="controls">
    <button id="btn-start" onclick="startCamera()">Включить камеру</button>
    <button id="btn-stop" onclick="stopCamera()">Остановить</button>
    <div class="sens-wrap">
      Чувствительность
      <input type="range" id="sens" min="1" max="10" value="5" step="1" style="width:90px;" oninput="updateSens(this.value)">
      <span id="sens-val" style="font-weight:600;min-width:14px;">5</span>
    </div>
    <label class="mute-wrap">
      <input type="checkbox" id="mute"> Без звука
    </label>
  </div>

  <div id="alerts-log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
<script>
let camera = null, stream = null, audioCtx = null;
let alertCooldown = 0, sensitivity = 5, alertCount = 0;
let running = false, faceMesh = null;
let baselineSet = false, baselineBrow = null, calibFrames = 0;
const CALIB_NEEDED = 30;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function updateSens(v) { sensitivity = parseInt(v); document.getElementById('sens-val').textContent = v; }

function setStatus(text, color) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').style.background = color || '#aaa';
}

function playBeep(freq, duration, type) {
  if (document.getElementById('mute').checked) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

function dist(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2);
}

function showAlert(label, isWarn) {
  const ov = document.getElementById('alert-overlay');
  const lb = document.getElementById('alert-label');
  const color = isWarn ? '#BA7517' : '#D85A30';
  ov.style.display = 'block';
  ov.style.borderColor = color;
  ov.style.background = isWarn ? 'rgba(186,117,23,0.12)' : 'rgba(216,90,48,0.12)';
  lb.style.display = 'block';
  lb.style.background = color;
  lb.textContent = label;
  alertCount++;
  const t = new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('alerts-log').textContent = `Последнее: ${t} — ${label} (всего: ${alertCount})`;
  setTimeout(() => { ov.style.display='none'; lb.style.display='none'; }, 900);
}

function updateMetric(id, barId, value, threshold) {
  const pct = Math.min(100, Math.round(value * 100));
  document.getElementById(id).textContent = pct + '%';
  const bar = document.getElementById(barId);
  bar.style.width = pct + '%';
  bar.style.background = value > threshold ? '#D85A30' : value > threshold * 0.7 ? '#BA7517' : '#1D9E75';
}

function onResults(results) {
  if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
    setStatus('Лицо не обнаружено — направь камеру на лицо', '#BA7517');
    return;
  }
  const lm = results.multiFaceLandmarks[0];
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;

  const thresh = (11 - sensitivity) / 10;

  const browCenter = lm[9];
  const browScore = (dist(lm[70], browCenter) + dist(lm[107], browCenter) + dist(lm[300], browCenter) + dist(lm[336], browCenter)) / 4;

  if (!baselineSet) {
    if (calibFrames === 0) setStatus('Смотри спокойно — калибровка...', '#378ADD');
    if (calibFrames < CALIB_NEEDED) {
      baselineBrow = baselineBrow === null ? browScore : baselineBrow * 0.9 + browScore * 0.1;
      calibFrames++;
      return;
    }
    baselineSet = true;
    setStatus('Активно — следим за напряжением лица', '#1D9E75');
  }

  const browRatio = baselineBrow > 0 ? (baselineBrow - browScore) / baselineBrow : 0;
  const browNorm = Math.max(0, Math.min(1, browRatio * 8));

  const leftEyeH = dist(lm[159], lm[145]);
  const rightEyeH = dist(lm[386], lm[374]);
  const leftOpen = dist(lm[33], lm[133]) > 0 ? leftEyeH / dist(lm[33], lm[133]) : 0.3;
  const rightOpen = dist(lm[362], lm[263]) > 0 ? rightEyeH / dist(lm[362], lm[263]) : 0.3;
  const squintScore = Math.max(0, Math.min(1, (0.35 - (leftOpen + rightOpen) / 2) / 0.35 * 1.5));

  const noseW = dist(lm[129], lm[358]);
  const mouthNose = dist(lm[4], lm[0]);
  const scrunchScore = Math.max(0, Math.min(1, (noseW * 4 - mouthNose) / (noseW * 2)));

  const adjT = thresh * 0.75;
  updateMetric('m-brow', 'bar-brow', browNorm, adjT);
  updateMetric('m-squint', 'bar-squint', squintScore, adjT);
  updateMetric('m-scrunch', 'bar-scrunch', scrunchScore, adjT);

  if (alertCooldown > 0) { alertCooldown--; return; }

  if (browNorm > adjT && browNorm >= squintScore && browNorm >= scrunchScore) {
    showAlert('Расслабь брови!', false);
    playBeep(440, 0.35, 'sine');
    alertCooldown = 40;
  } else if (squintScore > adjT && squintScore >= scrunchScore) {
    showAlert('Не прищуривайся!', true);
    playBeep(520, 0.3, 'triangle');
    alertCooldown = 40;
  } else if (scrunchScore > adjT) {
    showAlert('Расслабь нос!', true);
    playBeep(380, 0.3, 'triangle');
    alertCooldown = 40;
  }
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    video.srcObject = stream;
    setStatus('Загрузка модели лица...', '#378ADD');
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';

    faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    camera = new Camera(video, {
      onFrame: async () => { if (running && video.readyState >= 2) await faceMesh.send({ image: video }); },
      width: 640, height: 480
    });
    running = true;
    camera.start();
    baselineSet = false; baselineBrow = null; calibFrames = 0;
  } catch(e) {
    setStatus('Ошибка доступа к камере: ' + e.message, '#D85A30');
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
  }
}

function stopCamera() {
  running = false;
  if (camera) { camera.stop(); camera = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (faceMesh) { faceMesh.close(); faceMesh = null; }
  video.srcObject = null;
  baselineSet = false; baselineBrow = null; calibFrames = 0;
  document.getElementById('btn-start').style.display = 'inline-block';
  document.getElementById('btn-stop').style.display = 'none';
  ['m-brow','m-squint','m-scrunch'].forEach(id => document.getElementById(id).textContent = '—');
  ['bar-brow','bar-squint','bar-scrunch'].forEach(id => document.getElementById(id).style.width = '0%');
  setStatus('Остановлено', '#aaa');
}
</script>
</body>
</html>
